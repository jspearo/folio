# Zoznam pravidelnych dokladov ocakavanych kazdy mesiac (alebo zriedkavejsie).
# Edituj podla skutocnych dodavatelov tvojej firmy.
#
# frequency: monthly | quarterly | yearly | irregular
# months (iba pre quarterly/yearly): cisla mesiacov 1-12 kedy ocakavame
# aliases (volitelne): alternativne slug-y pre matching (vendor sa moze na
#   doklade volat inak, napr. prevadzkovatel cerpacej stanice namiesto znacky)

vendors:
  # === Telco (mesacne) ===
  - slug: o2-slovakia
    name: "O2 Slovakia, s.r.o."
    frequency: monthly
    category: telco
    aliases: [o2]

  - slug: slovak-telekom
    name: "Slovak Telekom, a.s."
    frequency: monthly
    category: telco
    aliases: [telekom]

  # === Banka (mesacny vypis z uctu) ===
  - slug: tatra-banka
    name: "Tatra banka, a.s."
    frequency: monthly
    category: bank
    aliases: [tatrabanka, tatra, vypis]
    # Pozn.: vypis z uctu sa stahuje do vystup/<mesiac>/_bank/raw/ ako
    # sifrovane PDF; nazov suboru je cislo uctu, nie "tatra", takze
    # matching cez slug v hlavnom foldri nezabera -> pritomnost vypisu
    # over vo _bank/raw/.

  # === Pohonne hmoty (zvycajne kazdy mesiac, konkretna stanica sa meni) ===
  # Staci doklad z lubovolnej z tychto stanic. Doklad vystavuje
  # prevadzkovatel stanice (napr. Janosik-NEA, BEDYMAR, HSV pre Shell,
  # J&J Property Invest), nie znacka -> preto su uvedeni ako aliasy.
  - slug: pohonne-hmoty
    name: "Pohonne hmoty (Shell / OMV / Slovnaft)"
    frequency: monthly
    category: fuel
    aliases: [shell, omv, slovnaft, janosik-nea, bedymar, hsv, j-j-property-invest, jj-property-invest]

  # === Nepravidelne (missing nie je chyba) ===
  - slug: webglobe-yegon
    name: "Webglobe – Yegon, s.r.o."
    frequency: irregular
    category: hosting
    aliases: [webglobe]

  - slug: alza
    name: "Alza.sk s.r.o."
    frequency: irregular
    category: retail
